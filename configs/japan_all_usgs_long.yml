region:
  name: japan_all_usgs_1900_2026_m3_depth700
  bbox: [122.0, 20.0, 154.0, 46.5]
  crs_local: EPSG:3857
  start_date: "1900-01-01"
  end_date: "2026-06-28"

filters:
  min_magnitude: 3.0
  max_depth_km: 700
  mechanism_min_magnitude: 4.0
  max_events_for_waveforms: 5000

simulation:
  dt_days: 30
  years: 100
  n_ensemble: 1000
  shear_modulus_pa: 3.0e10
  poisson_ratio: 0.25
  effective_friction_range: [0.2, 0.6]
  cohesion_pa_range: [1.0e6, 1.0e7]
  effective_normal_stress_pa_range: [1.0e7, 1.0e8]
  random_seed: 46

outputs:
  write_maps: true
  write_dashboard: true
  write_report: true

data_sources:
  use_fdsn: false
  fdsn_client: USGS
  catalog_source: USGS ComCat
  mechanism_csv: data/raw/usgs/japan_all_1900_2026_m4_mechanisms.csv
  event_csv: data/raw/usgs/japan_all_1900_2026_m3_depth700_events.csv
  use_jshis: false
  use_gnss: false
  use_active_faults: false
  use_waveforms: true
  waveform_spectra_csv: data/raw/waveforms/fdsn/japan_all_1900_2026_m6_spectra.csv
  waveform_feature_csv: data/raw/waveforms/fdsn/japan_all_1900_2026_m6_waveform_features.csv

preprocessing:
  compact_enabled: true
  time_bin_days: 30
  spatial_bin_km: 10.0
  depth_bin_km: 10.0
  magnitude_bin: 0.5
  retain_event_level_compact: true
  materialize_database: true
  prefer_compact_tables: true

resources:
  memory_mode: auto
  db_engine: auto
  max_memory_fraction: 0.35
  in_memory_row_limit: 100000
  db_bulk_load_row_threshold: 100000
  batch_rows_min: 10000
  batch_rows_max: 250000

visualization_3d:
  enabled: true
  engine: plotly
  html_standalone: true
  include_plotlyjs: true
  time_bin_days: 30
  mode: cumulative
  max_events: 20000
  max_fault_segments: 1000
  max_frames: 300
  vertical_exaggeration: 2.0
  event_marker_size_min: 2
  event_marker_size_max: 12
  color_events_by: magnitude
  color_faults_by: fault_score
  color_stress_by: cfs_pa
  color_failure_by: failure_index_p50
  show_known_faults: true
  show_inferred_faults: true
  show_gnss_vectors: true
  show_stress: true
  show_failure_index: true
  gnss_vector_scale: 50000.0

waveform_array:
  enabled: true
  time_bin_days: 30
  max_events: 2000
  max_stations_per_event: 256
  min_stations: 4
  projection_grid_km: 20.0
  projection_radius_km: 80.0
  velocity_km_s: 3.5
  depth_velocity_min_km_s: 2.8
  depth_velocity_max_km_s: 4.6
  depth_velocity_samples: 7
  projection_refinement_enabled: true
  projection_refinement_fraction: 0.5
  projection_refinement_steps: 1
  delay_sigma_s: 0.35
  top_projections_per_event: 128
  max_projection_rows: 250000
  splat_sigma_horizontal_m: 20000.0
  splat_sigma_vertical_m: 12000.0
  max_splats: 250000
  use_phase: true
  use_group_delay: true
  output_ply: true
  output_html_preview: true
