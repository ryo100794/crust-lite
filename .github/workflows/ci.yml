name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install local dependencies
        run: python -m pip install --target .deps -e ".[dev,fast-json]"
      - name: Ruff
        run: PYTHONPATH=.deps:src python -m ruff check src tests
      - name: Mypy
        run: PYTHONPATH=.deps:src python -m mypy src
      - name: Pytest
        run: PYTHONPATH=.deps:src python -m pytest
